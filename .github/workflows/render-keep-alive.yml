name: Render Keep Alive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL secret is not set."
            exit 1
          fi

          curl --fail --silent --show-error \
            --max-time 30 \
            "$HEALTHCHECK_URL"
